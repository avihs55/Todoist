<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todoist</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        .title {
            text-align: center;
            margin-bottom: 50px;
            margin-top: 25px;
        }

        .task-section {
            margin-top: 25px;
        }

        .ts-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 0;
        }

        .task-section ul {
           margin-top: 9px;
        }

        .task-section ul li {
            margin-bottom: 2px;
        }
    </style>
</head>
<body>
    <h1 class="title">Todoist</h1>
    <form>
        <input type="text" placeholder="Learn JS" id="task" name="task">
        <input type="submit" value="Add Task">
    </form>

    <div class="task-section">
        <p class="ts-title">Tasks</p>
        <ul class="task-list"></ul>
    </div>
    <script>
        document.querySelector('form').onsubmit = function() {
            const task = document.querySelector('#task').value;
    
            const li = document.createElement('li');
            li.innerHTML = task;
    
            document.querySelector('.task-list').append(li);
            return false;
        }
    </script>
</body>
</html>
